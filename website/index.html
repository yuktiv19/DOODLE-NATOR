<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DOODLE-NATOR</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;600&display=swap"
        rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.0/dist/tf.min.js"></script>

    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --black: #080808;
            --surface: #111111;
            --card: #161616;
            --border: #2a2a2a;
            --gold: #c9a84c;
            --gold-dim: #8a6d2f;
            --rose: #b76e79;
            --white: #f0ece4;
            --muted: #666;
        }

        html,
        body {
            height: 100%;
            background: var(--black);
            color: var(--white);
            font-family: 'Cormorant Garamond', serif;
            overflow-x: hidden;
        }

        /* ── Grain overlay ── */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 999;
            opacity: 0.6;
        }

        /* ── Ambient orbs ── */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            pointer-events: none;
            z-index: 0;
        }

        .orb-1 {
            width: 500px;
            height: 500px;
            background: rgba(201, 168, 76, 0.06);
            top: -150px;
            left: -100px;
        }

        .orb-2 {
            width: 400px;
            height: 400px;
            background: rgba(183, 110, 121, 0.05);
            bottom: -100px;
            right: -80px;
        }

        /* ── Main layout ── */
        main {
            position: relative;
            z-index: 10;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2.5rem;
            max-width: 1000px;
            margin: 4rem auto;
            padding: 0 2.5rem;
            align-items: stretch;
        }

        /* ── Right column ── */
        .right-col {
            display: flex;
            flex-direction: column;
            gap: 2.5rem;
            justify-content: center;
        }

        .canvas-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 1.5rem;
            box-shadow: 0 0 60px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.03);
        }

        .canvas-label {
            font-family: 'Cinzel', serif;
            font-size: 0.65rem;
            letter-spacing: 0.4em;
            color: var(--gold);
            text-transform: uppercase;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .canvas-label::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, var(--gold-dim), transparent);
        }

        .canvas-wrap {
            position: relative;
            border: 1px solid var(--border);
            border-radius: 2px;
            overflow: hidden;
        }

        .canvas-wrap::before {
            content: '';
            position: absolute;
            inset: 0;
            box-shadow: inset 0 0 40px rgba(0, 0, 0, 0.5);
            pointer-events: none;
            z-index: 2;
        }

        #drawCanvas {
            display: block;
            width: 100%;
            aspect-ratio: 1;
            background: #0f0f0f;
            cursor: crosshair;
            touch-action: none;
        }

        /* Canvas glow when drawing */
        .canvas-wrap.active {
            border-color: var(--gold-dim);
            box-shadow: 0 0 20px rgba(201, 168, 76, 0.12);
        }

        .canvas-hint {
            font-style: italic;
            font-size: 0.85rem;
            color: var(--muted);
            text-align: center;
            margin-top: 0.75rem;
            letter-spacing: 0.04em;
        }

        .btn-clear {
            margin-top: 1.25rem;
            width: 100%;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--white);
            font-family: 'Cinzel', serif;
            font-size: 0.65rem;
            letter-spacing: 0.4em;
            text-transform: uppercase;
            padding: 0.9rem 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .btn-clear::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent, rgba(201, 168, 76, 0.06), transparent);
            transform: translateX(-100%);
            transition: transform 0.5s ease;
        }

        .btn-clear:hover {
            border-color: var(--gold-dim);
            color: var(--gold);
        }

        .btn-clear:hover::before {
            transform: translateX(100%);
        }

        .btn-clear:active {
            background: rgba(201, 168, 76, 0.05);
        }

        /* ── Prediction card ── */
        .prediction-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 1.5rem;
            min-height: 200px;
            display: flex;
            flex-direction: column;
        }

        .prediction-label {
            font-family: 'Cinzel', serif;
            font-size: 0.65rem;
            letter-spacing: 0.4em;
            color: var(--gold);
            text-transform: uppercase;
            margin-bottom: 1.25rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .prediction-label::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, var(--gold-dim), transparent);
        }

        .prediction-main {
            font-family: 'Cinzel', serif;
            font-size: clamp(1.6rem, 3vw, 2.2rem);
            font-weight: 400;
            color: var(--white);
            letter-spacing: 0.08em;
            margin-bottom: 0.3rem;
            min-height: 2.5rem;
            transition: all 0.4s ease;
        }

        .prediction-main.idle {
            color: var(--muted);
            font-style: italic;
            font-size: 1.1rem;
            font-family: 'Cormorant Garamond', serif;
            letter-spacing: 0.04em;
        }

        .prediction-main.thinking {
            color: var(--muted);
            font-style: italic;
            font-size: 1rem;
            font-family: 'Cormorant Garamond', serif;
        }

        .prediction-main.error {
            color: var(--rose);
            font-size: 0.9rem;
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
        }

        .sure-text {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1rem;
            font-style: italic;
            color: var(--rose);
            letter-spacing: 0.06em;
            margin-top: 0.25rem;
            min-height: 1.4rem;
            transition: opacity 0.3s ease;
        }

        /* Top predictions list */
        .top-preds {
            margin-top: 1.25rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .pred-row {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            opacity: 0;
            transform: translateY(4px);
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        .pred-row.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .pred-name {
            font-size: 0.8rem;
            letter-spacing: 0.06em;
            color: var(--muted);
            width: 60px;
            text-transform: capitalize;
        }

        .pred-bar-wrap {
            flex: 1;
            height: 1px;
            background: var(--border);
            position: relative;
        }

        .pred-bar {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            background: var(--gold-dim);
            transition: width 0.5s ease;
        }

        .pred-pct {
            font-size: 0.75rem;
            color: var(--muted);
            width: 36px;
            text-align: right;
            font-style: italic;
        }

        /* ── Status / Robot ── */
        .status-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 1.25rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .robot {
            flex-shrink: 0;
            width: 48px;
            height: 48px;
            position: relative;
        }

        .robot-face {
            width: 48px;
            height: 44px;
            background: #1a1a2e;
            border: 1px solid #2a2a4a;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            animation: float 3s ease-in-out infinite;
        }

        .robot-eye {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--gold);
            box-shadow: 0 0 8px var(--gold);
            animation: blink 4s ease-in-out infinite;
        }

        .robot-eye:last-child {
            animation-delay: 0.1s;
        }

        .robot-base {
            width: 20px;
            height: 4px;
            background: #2a2a4a;
            margin: 0 auto;
            border-radius: 0 0 4px 4px;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-4px);
            }
        }

        @keyframes blink {

            0%,
            90%,
            100% {
                opacity: 1;
                transform: scaleY(1);
            }

            95% {
                opacity: 0.1;
                transform: scaleY(0.1);
            }
        }

        .robot.thinking .robot-eye {
            background: var(--rose);
            box-shadow: 0 0 8px var(--rose);
            animation: pulse-eye 0.8s ease-in-out infinite alternate;
        }

        @keyframes pulse-eye {
            from {
                opacity: 0.4;
            }

            to {
                opacity: 1;
            }
        }

        .status-text {
            flex: 1;
        }

        .status-state {
            font-family: 'Cinzel', serif;
            font-size: 0.6rem;
            letter-spacing: 0.35em;
            color: var(--muted);
            text-transform: uppercase;
            margin-bottom: 0.2rem;
        }

        .status-msg {
            font-size: 0.95rem;
            color: var(--white);
            font-style: italic;
        }

        /* Loading dot animation */
        .dot-anim::after {
            content: '';
            animation: dots 1.5s steps(4, end) infinite;
        }

        @keyframes dots {
            0% {
                content: '';
            }

            25% {
                content: '.';
            }

            50% {
                content: '..';
            }

            75% {
                content: '...';
            }
        }

        /* Robot emotion states */
        .robot.happy .robot-eye {
            background: #4caf50;
            box-shadow: 0 0 8px #4caf50;
        }

        .robot.happy .robot-face {
            border-color: #4caf50;
        }

        .robot.sad .robot-eye {
            background: var(--rose);
            box-shadow: 0 0 8px var(--rose);
            transform: scaleY(0.5);
        }

        .robot.sad .robot-face {
            border-color: var(--rose);
        }

        /* ── Feedback card ── */
        .feedback-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 1.25rem 1.5rem;
        }

        .feedback-label {
            font-family: 'Cinzel', serif;
            font-size: 0.65rem;
            letter-spacing: 0.4em;
            color: var(--gold);
            text-transform: uppercase;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .feedback-label::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, var(--gold-dim), transparent);
        }

        .feedback-btns {
            display: flex;
            gap: 0.75rem;
        }

        .btn-feedback {
            flex: 1;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--white);
            font-family: 'Cinzel', serif;
            font-size: 0.65rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            padding: 0.75rem 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-feedback.yes:hover {
            border-color: #4caf50;
            color: #4caf50;
        }

        .btn-feedback.no:hover {
            border-color: var(--rose);
            color: var(--rose);
        }

        .btn-feedback.yes.active {
            border-color: #4caf50;
            color: #4caf50;
            background: rgba(76, 175, 80, 0.06);
        }

        .btn-feedback.no.active {
            border-color: var(--rose);
            color: var(--rose);
            background: rgba(183, 110, 121, 0.06);
        }

        /* ── Responsive ── */
        @media (max-width: 680px) {
            main {
                grid-template-columns: 1fr;
                padding: 0 1.25rem;
            }

            header {
                padding: 1.5rem 1.25rem 0;
            }
        }
    </style>
</head>

<body>

    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <main>
        <!-- Left: Canvas -->
        <div class="canvas-card">
            <div class="canvas-label">Draw Area</div>
            <div class="canvas-wrap" id="canvasWrap">
                <canvas id="drawCanvas" width="280" height="280"></canvas>
            </div>
            <p class="canvas-hint">Draw freely — the AI watches in real time</p>
            <button class="btn-clear" id="clearBtn">Clear Canvas</button>
        </div>

        <!-- Right: Info -->
        <div class="right-col">

            <!-- Main prediction -->
            <div class="prediction-card">
                <div class="prediction-label">AI thinks it's</div>
                <div class="prediction-main idle" id="predictionMain">Draw something, AI will try to guess</div>
                <div class="sure-text" id="sureText"></div>
            </div>

            <!-- Robot status -->
            <div class="status-card">
                <div class="robot" id="robot">
                    <div class="robot-face">
                        <div class="robot-eye"></div>
                        <div class="robot-eye"></div>
                    </div>
                    <div class="robot-base"></div>
                </div>
                <div class="status-text">
                    <div class="status-state" id="statusState">Idle</div>
                    <div class="status-msg" id="statusMsg">Load the model to begin</div>
                </div>
            </div>

            <!-- Feedback card -->
            <div class="feedback-card" id="feedbackCard" style="display:none;">
                <div class="feedback-label">Did I guess right?</div>
                <div class="feedback-btns">
                    <button class="btn-feedback yes" id="btnYes">Yes!</button>
                    <button class="btn-feedback no" id="btnNo">No.</button>
                </div>
            </div>

        </div>
    </main>

    <script>
        // ── Config ──────────────────────────────────────────────
        const CLASSES = ['apple', 'star', 'cat', 'fish', 'house'];
        const MODEL_PATH = 'tfjs_model/model.json';
        const PREDICT_INTERVAL = 600; // ms

        // ── Elements ────────────────────────────────────────────
        const canvas = document.getElementById('drawCanvas');
        const ctx = canvas.getContext('2d');
        const canvasWrap = document.getElementById('canvasWrap');
        const clearBtn = document.getElementById('clearBtn');
        const predMain = document.getElementById('predictionMain');
        const sureText = document.getElementById('sureText');
        const robot = document.getElementById('robot');
        const statusState = document.getElementById('statusState');
        const statusMsg = document.getElementById('statusMsg');

        // ── State ────────────────────────────────────────────────
        let model = null;
        let isDrawing = false;
        let hasDrawn = false;
        let predictTimer = null;

        // ── Canvas drawing ───────────────────────────────────────
        ctx.fillStyle = '#0f0f0f';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = '#f0ece4';
        ctx.lineWidth = 8;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';

        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const src = e.touches ? e.touches[0] : e;
            return {
                x: (src.clientX - rect.left) * scaleX,
                y: (src.clientY - rect.top) * scaleY
            };
        }

        function startDraw(e) {
            e.preventDefault();
            isDrawing = true;
            const p = getPos(e);
            ctx.beginPath();
            ctx.moveTo(p.x, p.y);
            canvasWrap.classList.add('active');
        }

        function draw(e) {
            if (!isDrawing) return;
            e.preventDefault();
            const p = getPos(e);
            ctx.lineTo(p.x, p.y);
            ctx.stroke();
            hasDrawn = true;
            schedulePrediction();
        }

        function endDraw(e) {
            if (!isDrawing) return;
            isDrawing = false;
            ctx.beginPath();
        }

        canvas.addEventListener('mousedown', startDraw);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', endDraw);
        canvas.addEventListener('mouseleave', endDraw);
        canvas.addEventListener('touchstart', startDraw, { passive: false });
        canvas.addEventListener('touchmove', draw, { passive: false });
        canvas.addEventListener('touchend', endDraw);

        clearBtn.addEventListener('click', () => {
            ctx.fillStyle = '#0f0f0f';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            hasDrawn = false;
            canvasWrap.classList.remove('active');
            resetPredUI();
        });

        // ── Prediction scheduling ────────────────────────────────
        function schedulePrediction() {
            if (!model) return;
            clearTimeout(predictTimer);
            predictTimer = setTimeout(predict, PREDICT_INTERVAL);
        }

        // ── Feedback buttons ─────────────────────────────────────
        document.getElementById('btnYes').addEventListener('click', () => {
            robot.className = 'robot happy';
            setStatus('happy', 'Nailed it! 🎉');
            document.getElementById('btnYes').classList.add('active');
            document.getElementById('btnNo').classList.remove('active');
            setTimeout(() => { robot.className = 'robot'; }, 3000);
        });

        document.getElementById('btnNo').addEventListener('click', () => {
            robot.className = 'robot sad';
            setStatus('sad', "Lemme try again...");
            document.getElementById('btnNo').classList.add('active');
            document.getElementById('btnYes').classList.remove('active');
            setTimeout(() => { robot.className = 'robot'; }, 3000);
        });
        // ── Load model ───────────────────────────────────────────
        async function loadModel() {
            setStatus('loading', 'Loading neural network<span class="dot-anim"></span>');
            try {
                model = await tf.loadLayersModel(MODEL_PATH);
                setStatus('ready', 'Ready — start drawing');
                predMain.textContent = 'Draw something, AI will try to guess';
                predMain.className = 'prediction-main idle';
            } catch (err) {
                console.error('MODEL LOAD ERROR:', err);
                setStatus('error', 'Model failed to load');
                predMain.textContent = 'Model unavailable';
                predMain.className = 'prediction-main error';
            }
        }

        // ── Predict ──────────────────────────────────────────────
        async function predict() {
            if (!model || !hasDrawn) return;

            robot.classList.add('thinking');
            setStatus('thinking', 'Analysing your sketch');

            const tensor = tf.tidy(() => {
                return tf.browser.fromPixels(canvas, 1)
                    .resizeBilinear([28, 28])
                    .toFloat()
                    .div(255.0)
                    .expandDims(0);
            });

            try {
                const preds = await model.predict(tensor).data();
                tensor.dispose();

                const sorted = Array.from(preds)
                    .map((p, i) => ({ label: CLASSES[i], prob: p }))
                    .sort((a, b) => b.prob - a.prob);

                const top = sorted[0];
                const pct = Math.round(top.prob * 100);
                const label = top.label.toUpperCase();

                predMain.textContent = `IT'S A ${label}`;
                predMain.className = 'prediction-main';
                sureText.textContent = `${pct}% sure`;

                robot.classList.remove('thinking');
                setStatus('active', `It looks like a ${top.label}!`);
                document.getElementById('feedbackCard').style.display = 'block';
                document.getElementById('btnYes').classList.remove('active');
                document.getElementById('btnNo').classList.remove('active');
            } catch (e) {
                tensor.dispose();
                robot.classList.remove('thinking');
            }
        }

        function renderTopPreds(sorted) {
            topPreds.innerHTML = '';
            sorted.forEach((item, i) => {
                const pct = Math.round(item.prob * 100);
                const row = document.createElement('div');
                row.className = 'pred-row';
                row.innerHTML = `
          <span class="pred-name">${item.label}</span>
          <div class="pred-bar-wrap"><div class="pred-bar" style="width:${pct}%"></div></div>
          <span class="pred-pct">${pct}%</span>
        `;
                topPreds.appendChild(row);
                setTimeout(() => row.classList.add('visible'), i * 60);
            });
        }

        function resetPredUI() {
            predMain.textContent = 'Draw something, AI will try to guess';
            predMain.className = 'prediction-main idle';
            sureText.textContent = '';
            document.getElementById('feedbackCard').style.display = 'none';
            setStatus('ready', 'Canvas cleared — try again');
        }

        function setStatus(state, msg) {
            statusState.textContent = state.charAt(0).toUpperCase() + state.slice(1);
            statusMsg.innerHTML = msg;
        }

        // ── Boot ─────────────────────────────────────────────────
        loadModel();
    </script>
</body>

</html>
