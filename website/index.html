<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doodle-Bot AI | Luxury</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #0a0a0a;
            --bg-charcoal: #111111;
            --gold: #c9a84c;
            --rose-gold: #b76e79;
            --text-white: #f5f5f5;
        }

        body { 
            font-family: 'Cormorant Garamond', serif; 
            margin: 0;
            background: var(--bg-deep);
            color: var(--text-white);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .header {
            width: 100%;
            max-width: 900px;
            text-align: center;
            padding: 3rem 2rem 0;
            margin-bottom: -1rem;
        }

        .site-title {
            font-size: clamp(2rem, 5vw, 3rem);
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 0.3em;
            margin: 0 0 1rem 0;
            font-weight: 400;
        }

        .site-description {
            font-size: 1.1rem;
            color: rgba(245, 245, 245, 0.7);
            line-height: 1.6;
            margin: 0 auto;
            max-width: 600px;
            font-style: italic;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3rem;
            width: 100%;
            max-width: 900px;
            padding: 2rem;
        }

        @media (min-width: 768px) {
            .container {
                flex-direction: row;
                justify-content: space-around;
            }
        }

        .canvas-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
        }

        .canvas-label {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.4em;
            color: var(--gold);
            font-weight: 300;
        }

        .canvas-container {
            position: relative;
            padding: 12px;
            border: 1px solid rgba(201, 168, 76, 0.4);
            border-radius: 4px;
            background: var(--bg-charcoal);
            transition: border-color 0.4s ease, box-shadow 0.4s ease;
        }

        .canvas-container.thinking {
            animation: pulse-border 1.5s infinite alternate;
        }

        @keyframes pulse-border {
            from { border-color: rgba(201, 168, 76, 0.4); box-shadow: 0 0 5px rgba(201, 168, 76, 0); }
            to { border-color: rgba(201, 168, 76, 1); box-shadow: 0 0 20px rgba(201, 168, 76, 0.3); }
        }

        .canvas-container::after {
            content: '';
            position: absolute;
            top: 12px; left: 12px; right: 12px; bottom: 12px;
            pointer-events: none;
            box-shadow: inset 0 0 0 rgba(201, 168, 76, 0);
            transition: box-shadow 0.4s ease;
            border-radius: 2px;
        }

        .canvas-container.drawing::after {
            box-shadow: inset 0 0 40px rgba(201, 168, 76, 0.25);
        }

        #canvas {
            touch-action: none;
            cursor: crosshair;
            background: #fff;
            border-radius: 2px;
            display: block;
            filter: invert(0.9) hue-rotate(180deg);
        }

        .clear-btn {
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
            font-family: 'Cormorant Garamond', serif;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            padding: 0.8rem 2.5rem;
            font-size: 0.8rem;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: color 0.4s ease, border-color 0.4s ease;
            border-radius: 2px;
            outline: none;
        }

        .clear-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(201, 168, 76, 0.15), transparent);
            transition: left 0.6s ease;
        }

        .clear-btn:hover {
            color: #fff;
            border-color: #fff;
        }

        .clear-btn:hover::before {
            left: 100%;
            transition: left 0.8s ease;
        }

        /* Robot Redesign */
        .ai-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3rem;
            width: 320px;
        }

        .agent-container {
            animation: float-bot 4s ease-in-out infinite;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        @keyframes float-bot {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }

        .bot-head {
            width: 90px;
            height: 70px;
            background: linear-gradient(145deg, #1f1f1f, #0d0d0d);
            border: 1px solid #333;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.05);
            transition: all 0.5s ease;
        }

        .bot-eye {
            width: 6px;
            height: 6px;
            background: var(--gold);
            border-radius: 50%;
            box-shadow: 0 0 12px var(--gold);
            transition: all 0.4s ease;
        }

        .bot-head.thinking .bot-eye {
            background: var(--rose-gold);
            box-shadow: 0 0 15px var(--rose-gold);
            transform: scale(1.3);
            animation: blink 0.8s infinite alternate;
        }

        .bot-head.happy .bot-eye {
            height: 2px;
            transform: translateY(2px) scaleX(1.5);
            background: #fff;
            box-shadow: 0 0 10px #fff;
        }

        @keyframes blink {
            from { opacity: 0.4; }
            to { opacity: 1; }
        }

        .prediction-card {
            background: var(--bg-charcoal);
            border: 1px solid #222;
            padding: 2.5rem 2rem;
            border-radius: 4px;
            text-align: center;
            width: 100%;
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.8s ease, transform 0.8s ease;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
        }

        .prediction-card.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .speech-text {
            font-size: 2rem;
            color: var(--text-white);
            margin: 0 0 0.8rem 0;
            font-weight: 400;
            letter-spacing: 0.05em;
        }

        .conf-val {
            font-size: 0.75rem;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 0.3em;
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <header class="header">
        <h1 class="site-title">Doodle Nator</h1>
        <p class="site-description">
            Experience the fusion of art and artificial intelligence. 
            Sketch an object below, and watch as our neural network instantly interprets your creation in real-time.
        </p>
    </header>

    <div class="container">
        <div class="canvas-section">
            <div class="canvas-label">Draw Area</div>
            <div class="canvas-container" id="canvas-wrap">
                <canvas id="canvas" width="320" height="320"></canvas>
            </div>
            <button id="clearBtn" class="clear-btn">Clear</button>
        </div>

        <div class="ai-section">
            <div class="agent-container">
                <div id="bot-head" class="bot-head">
                    <div id="eye-l" class="bot-eye"></div>
                    <div id="eye-r" class="bot-eye"></div>
                </div>
            </div>

            <div id="prediction-card" class="prediction-card visible">
                <div id="speech" class="speech-text">Ready</div>
                <div id="conf-val" class="conf-val">Waiting for input</div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.0"></script>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const speech = document.getElementById('speech');
        const confVal = document.getElementById('conf-val');
        const botHead = document.getElementById('bot-head');
        const canvasWrap = document.getElementById('canvas-wrap');
        const predictionCard = document.getElementById('prediction-card');
        
        const categories = [
            "apple", "banana", "bread", "cup", "pizza", "ice cream", 
            "cloud", "sun", "moon", "star", "flower", "tree", "mountain", 
            "house", "door", "table", "wine bottle", "cell phone", "laptop", 
            "computer", "wristwatch", "camera", "headphones", "mailbox", 
            "flashlight", "circle", "square", "triangle", "line", "diamond"
        ];
        let model;

        function updateBot(mood) {
            botHead.className = 'bot-head';
            canvasWrap.className = 'canvas-container';
            if (mood === 'happy') {
                botHead.classList.add('happy');
            } else if (mood === 'thinking') {
                botHead.classList.add('thinking');
                canvasWrap.classList.add('thinking');
            }
            
            predictionCard.classList.remove('visible');
            void predictionCard.offsetWidth;
            predictionCard.classList.add('visible');
        }

        function clearCanvas() {
            ctx.fillStyle = "white";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.beginPath();
            speech.innerText = 'Awaiting drawing...';
            confVal.innerText = 'Status: Idle';
            updateBot('idle');
        }

        document.getElementById('clearBtn').onclick = clearCanvas;

        let drawing = false;
        function getXY(e) {
            const rect = canvas.getBoundingClientRect();
            const cx = e.touches ? e.touches[0].clientX : e.clientX;
            const cy = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: cx - rect.left, y: cy - rect.top };
        }

        canvas.onmousedown = (e) => { drawing = true; canvasWrap.classList.add('drawing'); draw(e); };
        canvas.ontouchstart = (e) => { e.preventDefault(); drawing = true; canvasWrap.classList.add('drawing'); draw(e); };
        window.onmouseup = () => { if(drawing) { drawing = false; canvasWrap.classList.remove('drawing'); ctx.beginPath(); predict(); } };
        window.ontouchend = () => { if(drawing) { drawing = false; canvasWrap.classList.remove('drawing'); ctx.beginPath(); predict(); } };
        canvas.onmousemove = draw;
        canvas.ontouchmove = (e) => { e.preventDefault(); draw(e); };

        function draw(e) {
            if (!drawing) return;
            const p = getXY(e);
            ctx.lineWidth = 16;
            ctx.lineCap = 'round';
            ctx.strokeStyle = "#333";
            ctx.lineTo(p.x, p.y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(p.x, p.y);
            updateBot('thinking');
        }

        async function init() {
            try {
                model = await tf.loadLayersModel('tfjs_model/model.json?v=2');
                clearCanvas();
            } catch (err) { 
                console.error("MODEL LOAD ERROR:", err);
                speech.innerText = 'System Error'; 
                confVal.innerText = 'Failed to load AI model';
            }
        }

        function getBoundingBox(ctx, width, height) {
            const data = ctx.getImageData(0, 0, width, height).data;
            let minX = width, minY = height, maxX = 0, maxY = 0;
            let found = false;
            for (let y = 0; y < height; y++) {
                for (let x = 0; x < width; x++) {
                    const r = data[(y * width + x) * 4];
                    if (r < 200) { 
                        if (x < minX) minX = x;
                        if (x > maxX) maxX = x;
                        if (y < minY) minY = y;
                        if (y > maxY) maxY = y;
                        found = true;
                    }
                }
            }
            if (!found) return null;
            // Pad the bounding box slightly
            const pad = 10;
            return { 
                x: Math.max(0, minX - pad), 
                y: Math.max(0, minY - pad), 
                w: Math.min(width, maxX - minX + 1 + pad * 2), 
                h: Math.min(height, maxY - minY + 1 + pad * 2) 
            };
        }

        function getCenteredCanvas() {
            const box = getBoundingBox(ctx, canvas.width, canvas.height);
            if (!box) return canvas;
            
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = 28;
            tempCanvas.height = 28;
            const tempCtx = tempCanvas.getContext('2d', { willReadFrequently: true });
            tempCtx.fillStyle = "white";
            tempCtx.fillRect(0, 0, 28, 28);
            
            const maxSize = 20;
            const scale = Math.min(maxSize / box.w, maxSize / box.h);
            const newW = box.w * scale;
            const newH = box.h * scale;
            const dx = (28 - newW) / 2;
            const dy = (28 - newH) / 2;
            
            tempCtx.drawImage(canvas, box.x, box.y, box.w, box.h, dx, dy, newW, newH);
            return tempCanvas;
        }

        async function predict() {
            if (!model) return;
            const processedCanvas = getCenteredCanvas();
            const tensor = tf.tidy(() => {
                let img = tf.browser.fromPixels(processedCanvas, 1);
                if (processedCanvas === canvas) {
                    img = tf.image.resizeBilinear(img, [28, 28]);
                }
                img = tf.scalar(255).sub(img).div(tf.scalar(255));
                return img.expandDims(0);
            });

            const p = await model.predict(tensor);
            const data = await p.data();
            const idx = data.indexOf(Math.max(...data));
            const conf = Math.round(data[idx] * 100);

            if (conf > 45) {
                speech.innerText = categories[idx].charAt(0).toUpperCase() + categories[idx].slice(1);
                confVal.innerText = `Confidence: ${conf}%`;
                updateBot('happy');
                // PRODUCTIVE ACTIONS BASED ON SHAPE
    const detected = categories[idx];
    if (conf > 80) { // Only trigger for high confidence
        if (detected === "flashlight") {
            document.body.style.filter = "brightness(2)"; // Visual feedback
            setTimeout(() => document.body.style.filter = "brightness(1)", 2000);
        }
        if (detected === "cell phone") {
            if(confirm("Do you want to open the emergency dialer?")) {
                window.location.href = "tel:911";
            }
        }
        if (detected === "mailbox") {
            window.location.href = "mailto:support@example.com?subject=Help Requested";
        }
    }
            } else {
                speech.innerText = 'Unsure...';
                confVal.innerText = 'Please add more details';
                updateBot('idle');
            }
            tensor.dispose();
            p.dispose();
        }

        init();
    </script>
</body>
</html>
